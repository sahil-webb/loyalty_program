# Residence Rewards — Shopify App Configuration
# https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "157693193015edb1a8bd299189f3467f"
name = "RS loyalty program"
application_url = "https://loyaltyprogram-production-2622.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
scopes = "read_customers,write_customers,read_orders,write_discounts,read_discounts"

[auth]
redirect_urls = ["https://loyaltyprogram-production-2622.up.railway.app/api/auth"]

[webhooks]
api_version = "2026-04"

  # App lifecycle
  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  # Orders — loyalty point earning
  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks/orders/cancelled"

  # GDPR — mandatory
  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks/shop/redact"

[app_proxy]
url = "/api/proxy"
prefix = "apps"
subpath = "rewards"
